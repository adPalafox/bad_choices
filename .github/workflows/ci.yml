name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 1/3 * *"

jobs:
  pr-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: |
          supabase start
          supabase db reset --local
          eval "$(supabase status -o env)"
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
            echo "BAD_CHOICES_TEST_RANDOM_SEED=bad-choices-ci"
            echo "BAD_CHOICES_TEST_FORCE_DETOURS=friends_5:special,friends_9:wildcard,date_5:special,date_9:wildcard,team_5:special,team_9:wildcard"
          } > .env.e2e

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run PR smoke checks
        run: npm run test:ci

  main-full:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: |
          supabase start
          supabase db reset --local
          eval "$(supabase status -o env)"
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
            echo "BAD_CHOICES_TEST_RANDOM_SEED=bad-choices-ci"
            echo "BAD_CHOICES_TEST_FORCE_DETOURS=friends_5:special,friends_9:wildcard,date_5:special,date_9:wildcard,team_5:special,team_9:wildcard"
          } > .env.e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run main and nightly checks
        run: npm run lint && npm run test:regressions && npm run test:packs && npm run build:e2e && npm run test:e2e:full
